name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'LICENSE*'
      - '.gitignore'
      - '.editorconfig'
    branches: [main]

jobs:
  codeql:
    uses: forbiddenlink/.github/.github/workflows/codeql.yml@main
    permissions:
      actions: read
      contents: read
      security-events: write
