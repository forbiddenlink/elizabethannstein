name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Audit dependencies
        run: pnpm audit --audit-level=critical
        continue-on-error: true

      - name: Type check
        run: pnpm tsc --noEmit

      - name: Biome
        run: pnpm biome:check

      - name: Test
        run: pnpm test

      - name: Cache Next.js build
        uses: actions/cache@v5
        with:
          path: .next/cache
          key: nextjs-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}-${{ hashFiles('**/*.ts', '**/*.tsx') }}
          restore-keys: |
            nextjs-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}-
            nextjs-${{ runner.os }}-

      - name: Build
        run: pnpm build

      # E2E disabled on push/PR: 206 tests x 7 projects with workers=1 timed out
      # at 45min every run for 50+ days. Move to scheduled nightly workflow so
      # type/lint/unit/build stay green on every push.
